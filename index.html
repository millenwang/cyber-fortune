<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星命之簿</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        /* ========== CSS Variables ========== */
        :root {
            --cyan: #00f0ff;
            --magenta: #ff00e5;
            --yellow: #ffe600;
            --bg-dark: #0a0a12;
            --bg-card: rgba(10, 10, 25, 0.75);
            --border-glow: rgba(0, 240, 255, 0.3);
            --text-primary: #ffffff;
            --text-dim: #c0c8e0;
        }

        /* ========== Reset & Base ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ========== Animated Background ========== */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .scanline {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 240, 255, 0.015) 2px,
                rgba(0, 240, 255, 0.015) 4px
            );
            z-index: 1;
            pointer-events: none;
            animation: scanMove 8s linear infinite;
        }
        @keyframes scanMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(4px); }
        }

        .grid-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background:
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 1;
            pointer-events: none;
        }

        /* ========== Main Container ========== */
        .container {
            position: relative;
            z-index: 10;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            overflow-x: hidden;
            width: 100%;
            box-sizing: border-box;
        }

        /* ========== Glitch Title ========== */
        .title-section {
            text-align: center;
            padding: 60px 0 40px;
        }
        .title {
            font-family: 'Orbitron', monospace;
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 900;
            color: var(--cyan);
            text-shadow:
                0 0 10px var(--cyan),
                0 0 40px rgba(0, 240, 255, 0.4),
                0 0 80px rgba(0, 240, 255, 0.2);
            position: relative;
            animation: glitch 3s infinite;
            letter-spacing: 4px;
        }
        .subtitle {
            font-family: 'Orbitron', monospace;
            font-size: clamp(0.7rem, 2vw, 0.9rem);
            color: var(--magenta);
            margin-top: 12px;
            letter-spacing: 8px;
            text-transform: uppercase;
            text-shadow: 0 0 15px var(--magenta);
        }

        @keyframes glitch {
            0%, 95%, 100% { transform: translate(0); }
            96% { transform: translate(-2px, 1px); filter: hue-rotate(90deg); }
            97% { transform: translate(2px, -1px); filter: hue-rotate(-90deg); }
            98% { transform: translate(-1px, -1px); }
            99% { transform: translate(1px, 2px); filter: hue-rotate(45deg); }
        }

        /* ========== Step Indicator ========== */
        .steps-indicator {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 40px;
        }
        .step-dot {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            opacity: 0.6;
            transition: all 0.5s ease;
        }
        .step-dot.active { opacity: 1; }
        .step-dot.done { opacity: 0.85; }
        .step-circle {
            width: 40px; height: 40px;
            border: 2px solid var(--cyan);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', monospace;
            font-size: 0.85rem;
            font-weight: 700;
            transition: all 0.5s ease;
        }
        .step-dot.active .step-circle {
            background: var(--cyan);
            color: var(--bg-dark);
            box-shadow: 0 0 20px var(--cyan), 0 0 40px rgba(0, 240, 255, 0.3);
        }
        .step-dot.done .step-circle {
            background: rgba(0, 240, 255, 0.2);
            border-color: var(--cyan);
        }
        .step-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 1px;
        }
        .step-dot.active .step-label { color: var(--cyan); }
        .step-connector {
            width: 60px;
            height: 2px;
            background: rgba(0, 240, 255, 0.15);
            align-self: center;
            position: relative;
        }
        .step-connector::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            height: 100%; width: 0%;
            background: var(--cyan);
            transition: width 0.5s ease;
        }
        .step-connector.done::after { width: 100%; }

        /* ========== Panel ========== */
        .panel {
            display: none;
            animation: fadeSlideIn 0.6s ease;
        }
        .panel.active { display: block; }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========== Card ========== */
        .cyber-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 4px;
            padding: 32px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        .cyber-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan), var(--magenta), transparent);
        }
        .cyber-card::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 30px; height: 30px;
            border-top: 2px solid var(--cyan);
            border-right: 2px solid var(--cyan);
        }

        .card-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--cyan);
            margin-bottom: 24px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }
        .card-title-center {
            text-align: center;
            font-family: 'Noto Sans SC', sans-serif;
        }

        /* ========== Form Elements ========== */
        .form-group {
            margin-bottom: 24px;
        }
        .form-label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .form-input, .form-select {
            width: 100%;
            padding: 14px 16px;
            max-width: 100%;
            min-width: 0;
            min-height: 48px;
            box-sizing: border-box;
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 2px;
            color: var(--text-primary);
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }
        .form-input:focus, .form-select:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2), inset 0 0 15px rgba(0, 240, 255, 0.05);
        }
        .form-input::placeholder { color: var(--text-dim); opacity: 0.5; }

        /* 日期选择器图标高亮 */
        input[type="date"] {
            min-height: 48px;
        }
        input[type="date"]::-webkit-date-and-time-value {
            text-align: left;
        }
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.85) sepia(1) hue-rotate(120deg) saturate(4);
            cursor: pointer;
            opacity: 1;
            flex-shrink: 0;
            min-width: 20px;
        }
        /* Firefox 日期选择器 */
        input[type="date"]::-webkit-date-and-time-value {
            text-overflow: ellipsis;
            overflow: hidden;
            white-space: nowrap;
        }

        /* ========== Music Toggle ========== */
        .music-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 500;
            width: 44px;
            height: 44px;
            background: rgba(10, 10, 25, 0.7);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
        }
        .music-toggle:hover {
            border-color: var(--cyan);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }
        .music-toggle svg {
            width: 20px;
            height: 20px;
            fill: var(--cyan);
            transition: fill 0.3s ease;
        }
        .music-toggle.muted svg { fill: var(--text-dim); }
        .music-toggle .muted-line {
            display: none;
        }
        .music-toggle.muted .muted-line { display: block; }
        .form-select option {
            background: #1a1a2e;
            color: var(--text-primary);
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            overflow: hidden;
        }

        .zodiac-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .zodiac-btn {
            padding: 12px 8px;
            background: rgba(0, 240, 255, 0.03);
            border: 1px solid rgba(0, 240, 255, 0.15);
            border-radius: 2px;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-size: 0.85rem;
        }
        .zodiac-btn:hover {
            border-color: var(--cyan);
            color: var(--cyan);
            background: rgba(0, 240, 255, 0.08);
        }
        .zodiac-btn.selected {
            border-color: var(--cyan);
            color: var(--cyan);
            background: rgba(0, 240, 255, 0.15);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }
        .zodiac-symbol {
            display: block;
            font-size: 1.5rem;
            margin-bottom: 4px;
        }

        /* ========== Buttons ========== */
        .btn-cyber {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 40px;
            background: transparent;
            border: 2px solid var(--cyan);
            color: var(--cyan);
            font-family: 'Orbitron', monospace;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-cyber::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.15), transparent);
            transition: left 0.5s ease;
        }
        .btn-cyber:hover::before { left: 100%; }
        .btn-cyber:hover {
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.3), inset 0 0 30px rgba(0, 240, 255, 0.1);
            transform: translateY(-2px);
        }
        .btn-cyber:active { transform: translateY(0); }

        .btn-magenta {
            border-color: var(--magenta);
            color: var(--magenta);
        }
        .btn-magenta:hover {
            background: rgba(255, 0, 229, 0.1);
            box-shadow: 0 0 30px rgba(255, 0, 229, 0.3), inset 0 0 30px rgba(255, 0, 229, 0.1);
        }
        .btn-magenta::before {
            background: linear-gradient(90deg, transparent, rgba(255, 0, 229, 0.15), transparent);
        }

        .btn-group {
            display: flex;
            gap: 16px;
            margin-top: 32px;
            justify-content: center;
        }

        /* ========== MBTI Quiz ========== */
        .quiz-progress {
            margin-bottom: 24px;
        }
        .progress-bar-container {
            height: 4px;
            background: rgba(0, 240, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--cyan), var(--magenta));
            transition: width 0.5s ease;
            box-shadow: 0 0 10px var(--cyan);
        }
        .progress-text {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.75rem;
            color: var(--text-dim);
            font-family: 'Orbitron', monospace;
        }

        .quiz-dimension {
            display: inline-block;
            padding: 4px 12px;
            border: 1px solid;
            border-radius: 2px;
            font-family: 'Orbitron', monospace;
            font-size: 0.75rem;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }
        .dim-EI { border-color: #ff6b6b; color: #ff6b6b; }
        .dim-SN { border-color: #ffd93d; color: #ffd93d; }
        .dim-TF { border-color: #6bcb77; color: #6bcb77; }
        .dim-JP { border-color: #4d96ff; color: #4d96ff; }

        .question-text {
            font-size: 1.15rem;
            font-weight: 400;
            line-height: 1.7;
            margin-bottom: 24px;
            color: var(--text-primary);
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .quiz-option {
            padding: 16px 20px;
            background: rgba(0, 240, 255, 0.03);
            border: 1px solid rgba(0, 240, 255, 0.15);
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-primary);
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .quiz-option:hover {
            border-color: var(--cyan);
            background: rgba(0, 240, 255, 0.08);
            transform: translateX(5px);
        }
        .quiz-option.selected {
            border-color: var(--magenta);
            background: rgba(255, 0, 229, 0.1);
            box-shadow: 0 0 20px rgba(255, 0, 229, 0.15);
        }

        /* ========== Loading Animation ========== */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 10, 18, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 30px;
        }
        .loading-overlay.active { display: flex; }

        .loading-hex {
            width: 80px; height: 80px;
            position: relative;
        }
        .loading-hex::before, .loading-hex::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: 2px solid var(--cyan);
            border-radius: 50%;
            animation: loadSpin 1.5s linear infinite;
        }
        .loading-hex::after {
            border-color: var(--magenta);
            animation-direction: reverse;
            animation-duration: 1s;
        }
        @keyframes loadSpin {
            0% { transform: rotate(0deg) scale(1); opacity: 1; }
            50% { transform: rotate(180deg) scale(0.6); opacity: 0.5; }
            100% { transform: rotate(360deg) scale(1); opacity: 1; }
        }

        .loading-text {
            font-family: 'Orbitron', monospace;
            font-size: 0.9rem;
            color: var(--cyan);
            letter-spacing: 4px;
            animation: textPulse 1s ease-in-out infinite;
        }
        @keyframes textPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .loading-messages {
            font-size: 0.8rem;
            color: var(--text-dim);
            text-align: center;
            line-height: 2;
        }

        /* ========== Result Page ========== */
        .result-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .result-mbti-type {
            font-family: 'Orbitron', monospace;
            font-size: clamp(3rem, 10vw, 5rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--cyan), var(--magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 8px;
        }
        .result-nickname {
            font-size: 1.1rem;
            color: var(--magenta);
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(255, 0, 229, 0.5);
        }

        .result-section {
            margin-bottom: 28px;
        }
        .result-section-title {
            font-family: 'Orbitron', monospace;
            font-size: 0.8rem;
            color: var(--cyan);
            letter-spacing: 3px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(0, 240, 255, 0.1);
            text-transform: uppercase;
        }
        .result-text {
            font-size: 0.95rem;
            line-height: 1.8;
            color: var(--text-primary);
        }

        .dimension-bars {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 28px;
        }
        .dim-bar-item {
            padding: 12px;
            background: rgba(0, 240, 255, 0.03);
            border: 1px solid rgba(0, 240, 255, 0.1);
            border-radius: 2px;
        }
        .dim-bar-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.8rem;
        }
        .dim-bar-track {
            height: 6px;
            background: rgba(0, 240, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        .dim-bar-value {
            height: 100%;
            border-radius: 3px;
            transition: width 1.5s ease;
        }

        .fortune-card {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.08), rgba(255, 0, 229, 0.08));
            border: 1px solid rgba(255, 0, 229, 0.3);
            border-radius: 2px;
            padding: 24px;
            margin-bottom: 28px;
            position: relative;
        }
        .fortune-card::before {
            content: '🔮';
            position: absolute;
            top: -12px; left: 20px;
            font-size: 1.5rem;
        }
        .fortune-title {
            font-family: 'Orbitron', monospace;
            font-size: 0.85rem;
            color: var(--magenta);
            letter-spacing: 2px;
            margin-bottom: 12px;
            padding-top: 4px;
        }
        .fortune-items {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        .fortune-item {
            text-align: center;
        }
        .fortune-item-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        .fortune-item-value {
            font-family: 'Orbitron', monospace;
            font-size: 1rem;
            font-weight: 700;
        }
        .fortune-excellent { color: #ff6b6b; }
        .fortune-great { color: var(--magenta); }
        .fortune-good { color: var(--yellow); }
        .fortune-ok { color: var(--cyan); }

        .compatibility-section {
            margin-bottom: 28px;
        }
        .compat-pair {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 12px;
            padding: 12px;
            background: rgba(0, 240, 255, 0.03);
            border: 1px solid rgba(0, 240, 255, 0.08);
            border-radius: 2px;
        }
        .compat-type {
            font-family: 'Orbitron', monospace;
            font-size: 0.9rem;
            font-weight: 700;
            width: 40px;
            text-align: center;
        }
        .compat-desc {
            font-size: 0.85rem;
            color: var(--text-dim);
        }
        .compat-tag {
            margin-left: auto;
            padding: 4px 10px;
            border-radius: 2px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .tag-soulmate { background: rgba(255, 0, 229, 0.2); color: var(--magenta); border: 1px solid var(--magenta); }
        .tag-friend { background: rgba(0, 240, 255, 0.15); color: var(--cyan); border: 1px solid var(--cyan); }
        .tag-work { background: rgba(255, 230, 0, 0.15); color: var(--yellow); border: 1px solid var(--yellow); }

        .cyber-horoscope {
            padding: 20px;
            border: 1px solid rgba(0, 240, 255, 0.15);
            border-radius: 2px;
            margin-bottom: 28px;
            background: rgba(0, 240, 255, 0.02);
        }
        .horoscope-symbol {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }
        .horoscope-name {
            font-family: 'Orbitron', monospace;
            font-size: 0.85rem;
            color: var(--cyan);
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .analysis-tip {
            padding: 16px 20px;
            border-left: 3px solid var(--cyan);
            background: rgba(0, 240, 255, 0.03);
            font-size: 0.85rem;
            line-height: 1.7;
            color: var(--text-dim);
            margin-bottom: 28px;
        }

        /* ========== Toast ========== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(255, 0, 229, 0.15);
            border: 1px solid var(--magenta);
            color: var(--magenta);
            padding: 12px 24px;
            border-radius: 2px;
            font-size: 0.85rem;
            z-index: 2000;
            transition: transform 0.4s ease;
            backdrop-filter: blur(10px);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* ========== Responsive ========== */
        @media (max-width: 992px) {
            .input-row { grid-template-columns: 1fr; gap: 12px; }
        }
        @media (max-width: 600px) {
            .container { padding: 16px; }
            .title-section { padding: 30px 0 20px; }
            .input-row { grid-template-columns: 1fr; gap: 12px; }
            .zodiac-grid { grid-template-columns: repeat(3, 1fr); }
            .dimension-bars { grid-template-columns: 1fr; }
            .fortune-items { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .steps-indicator { gap: 10px; }
            .step-connector { width: 30px; }

            /* 答题区域移动端优化 */

    // ========== Functions ==========
    function selectZodiac(btn) {
        document.querySelectorAll('.zodiac-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedZodiac = btn.dataset.zodiac;
    }

    function goToStep(step) {
        if (step === 2) {
            const name = document.getElementById('userName').value.trim();
            const birth = document.getElementById('birthDate').value;
            if (!name) { showToast('请输入你的名字或代号'); return; }
            if (!birth) { showToast('请选择你的出生日期'); return; }
            if (!selectedZodiac) { showToast('请选择你的星座'); return; }
            userData = { name, birth, birthTime: document.getElementById('birthTime').value };
            currentQuestion = 0;
            answers = [];
            renderQuestion();
        }
        if (step === 3) {
            if (answers.length < questions.length) { showToast('请完成所有测试题目'); return; }
            showLoading();
            return; // 不再继续执行下面的面板切换，由 showLoading 完成后处理
        }

        switchPanel(step);
        currentStep = step;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function switchPanel(step) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById('panel' + step).classList.add('active');

        for (let i = 1; i <= 3; i++) {
            const dot = document.getElementById('stepDot' + i);
            dot.classList.remove('active', 'done');
            if (i < step) dot.classList.add('done');
            if (i === step) dot.classList.add('active');
        }
        for (let i = 1; i <= 2; i++) {
            const conn = document.getElementById('conn' + i);
            conn.classList.toggle('done', i < step);
        }
    }

    function renderQuestion() {
        const q = questions[currentQuestion];
        document.getElementById('questionText').textContent = `${currentQuestion + 1}. ${q.q}`;
        document.getElementById('quizDimLabel').textContent = q.label;
        document.getElementById('quizCount').textContent = `${currentQuestion + 1} / ${questions.length}`;
        document.getElementById('quizProgress').style.width = `${((currentQuestion + 1) / questions.length) * 100}%`;

        // 更新已答/总数
        const answered = answers.filter(a => a !== undefined).length;
        document.getElementById('quizAnswered').textContent = `已答 ${answered} / ${questions.length}`;

        const tag = document.getElementById('quizDimensionTag');
        tag.className = 'quiz-dimension ' + q.cls;
        tag.textContent = q.label;

        const opts = document.getElementById('quizOptions');
        opts.innerHTML = '';
        q.a.forEach((opt, idx) => {
            const div = document.createElement('div');
            div.className = 'quiz-option' + (answers[currentQuestion] === idx ? ' selected' : '');
            div.textContent = `${String.fromCharCode(65 + idx)}. ${opt.text}`;
            div.onclick = () => {
                answers[currentQuestion] = idx;
                document.querySelectorAll('.quiz-option').forEach(o => o.classList.remove('selected'));
                div.classList.add('selected');
                document.getElementById('btnNextQuiz').style.display = 'inline-flex';
            };
            opts.appendChild(div);
        });

        document.getElementById('btnPrevQuiz').style.display = currentQuestion > 0 ? 'inline-flex' : 'none';
        document.getElementById('btnNextQuiz').style.display = answers[currentQuestion] !== undefined ? 'inline-flex' : 'none';
        document.getElementById('btnNextQuiz').textContent = currentQuestion === questions.length - 1 ? '揭晓命运 →' : '下一题 →';
    }

    function nextQuestion() {
        if (answers[currentQuestion] === undefined) { showToast('请选择一个选项'); return; }
        if (currentQuestion < questions.length - 1) { currentQuestion++; renderQuestion(); }
        else { goToStep(3); }
    }

    function prevQuestion() {
        if (currentQuestion > 0) { currentQuestion--; renderQuestion(); }
    }

    function calcMBTI() {
        let dims = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
        answers.forEach((ansIdx, qIdx) => {
            const val = questions[qIdx].a[ansIdx].value;
            dims[val]++;
        });
        const type = (dims.E >= dims.I ? 'E' : 'I') + (dims.S >= dims.N ? 'S' : 'N') +
                     (dims.T >= dims.F ? 'T' : 'F') + (dims.J >= dims.P ? 'J' : 'P');
        const scores = {
            EI: { left: 'E', right: 'I', leftScore: dims.E, rightScore: dims.I, total: dims.E + dims.I },
            SN: { left: 'S', right: 'N', leftScore: dims.S, rightScore: dims.N, total: dims.S + dims.N },
            TF: { left: 'T', right: 'F', leftScore: dims.T, rightScore: dims.F, total: dims.T + dims.F },
            JP: { left: 'J', right: 'P', leftScore: dims.J, rightScore: dims.P, total: dims.J + dims.P }
        };
        return { type, scores };
    }

    function getFortune() {
        const fortunes = [
            { love: '大吉', career: '中吉', wealth: '小吉', health: '大吉', social: '中吉', creative: '大吉' },
            { love: '中吉', career: '大吉', wealth: '中吉', health: '小吉', social: '大吉', creative: '中吉' },
            { love: '小吉', career: '中吉', wealth: '大吉', health: '中吉', social: '小吉', creative: '大吉' },
            { love: '大吉', career: '小吉', wealth: '中吉', health: '大吉', social: '中吉', creative: '小吉' },
            { love: '中吉', career: '大吉', wealth: '大吉', health: '中吉', social: '大吉', creative: '中吉' },
            { love: '大吉', career: '中吉', wealth: '小吉', health: '中吉', social: '大吉', creative: '大吉' }
        ];
        return fortunes[Math.floor(Math.random() * fortunes.length)];
    }

    function getFortuneClass(level) {
        if (level === '大吉') return 'fortune-excellent';
        if (level === '中吉') return 'fortune-great';
        return 'fortune-good';
    }

    function showLoading() {
        const loading = document.getElementById('loading');
        const msgEl = document.getElementById('loadingMsg');
        loading.classList.add('active');

        const msgs = [
            '▸ 正在连接赛博星座数据库...',
            '▸ 解析MBTI神经网络矩阵...',
            '▸ 加载量子命理算法...',
            '▸ 计算星体轨迹干涉参数...',
            '▸ 运行性格深度解码程序...',
            '▸ 生成赛博命运报告...',
            '▸ 校准灵魂数据流...'
        ];

        let i = 0;
        msgEl.textContent = msgs[0];
        const interval = setInterval(() => {
            i++;
            if (i < msgs.length) {
                msgEl.textContent = msgs.slice(0, i + 1).join('\n');
            }
        }, 400);

        setTimeout(() => {
            clearInterval(interval);
            loading.classList.remove('active');
            generateResult();
        }, 3000);
    }

    function generateResult() {
        const { type, scores } = calcMBTI();
        const data = mbtiData[type];
        const zodiac = zodiacData[selectedZodiac];
        const fortune = getFortune();

        // MBTI Type
        document.getElementById('resultType').textContent = type;
        document.getElementById('resultNickname').textContent = `「${data.nickname}」`;

        // Dimension bars
        const dimColors = { EI: '#ff6b6b', SN: '#ffd93d', TF: '#6bcb77', JP: '#4d96ff' };
        let barsHTML = '';
        for (const [key, val] of Object.entries(scores)) {
            const leftPct = Math.round((val.leftScore / val.total) * 100);
            const rightPct = 100 - leftPct;
            const leftActive = leftPct >= 50;
            barsHTML += `
                <div class="dim-bar-item">
                    <div class="dim-bar-label">
                        <span style="color:${dimColors[key]};font-weight:700">${val.left} ${leftPct}%</span>
                        <span style="color:${dimColors[key]};font-weight:700">${rightPct}% ${val.right}</span>
                    </div>
                    <div class="dim-bar-track" style="background:linear-gradient(90deg, ${dimColors[key]}33, ${dimColors[key]}33)">
                        <div class="dim-bar-value" style="width:${leftActive ? leftPct : rightPct}%;background:${dimColors[key]};float:${leftActive ? 'left' : 'right'}"></div>
                    </div>
                </div>`;
        }
        document.getElementById('dimBars').innerHTML = barsHTML;

        // Description
        document.getElementById('resultDesc').textContent = data.desc;

        // Horoscope
        document.getElementById('horoscopeSymbol').textContent = zodiac.symbol;
        document.getElementById('horoscopeName').textContent = `${zodiac.name} · ${zodiac.cnName}`;
        document.getElementById('horoscopeDesc').textContent =
            `${zodiac.cnName}（${zodiac.dates}）· ${zodiac.element}象星座 · ${zodiac.trait}。当${data.nickname}的灵魂与${zodiac.cnName}的能量场产生共振，你将展现出独一无二的人格光谱——在${zodiac.element}象力量的加持下，你的核心特质将被进一步放大和升华。`;

        // Fortune
        const fortuneLabels = {

            health: '健康运', social: '人际运', creative: '灵感运'
        };
        let fortuneHTML = '';
        for (const [key, label] of Object.entries(fortuneLabels)) {
            fortuneHTML += `
                <div class="fortune-item">
                    <div class="fortune-item-label">${label}</div>
                    <div class="fortune-item-value ${getFortuneClass(fortune[key])}">${fortune[key]}</div>
                </div>`;
        }
        document.getElementById('fortuneItems').innerHTML = fortuneHTML;

        // Compatibility
        const compat = compatibilityData[type];
        let compatHTML = '';
        compat.forEach(c => {
            compatHTML += `
                <div class="compat-pair">
                    <span class="compat-type" style="color:var(--cyan)">${c.type}</span>
                    <span class="compat-desc">${c.desc}</span>
                    <span class="compat-tag ${c.tagCls}">${c.tag}</span>
                </div>`;
        });
        document.getElementById('compatSection').innerHTML = compatHTML;

        // Tip
        const tips = [
            `本报告由赛博算命神经网络 v3.7 生成，结合了${zodiac.cnName}星座能量场数据和MBTI性格光谱分析。所有分析结果仅供娱乐参考，真正的命运永远掌握在你自己的手中。`,
            `赛博命理分析完成。你的${type}人格与${zodiac.cnName}的能量产生了独特的量子纠缠效应。请记住：这份报告解读的是你的可能性，而非局限性。`,
            `⚠️ 系统提示：虽然赛博算命系统使用了先进的AI算法，但未来永远有无限可能。${type}的「${data.nickname}」特质加上${zodiac.cnName}的力量，你比任何预测都要精彩。`
        ];
        document.getElementById('analysisTip').textContent = tips[Math.floor(Math.random() * tips.length)];

        // Advice
        document.getElementById('resultAdvice').textContent = data.advice;

        // 切换到结果面板（不再调用 goToStep 避免重复触发 showLoading）
        switchPanel(3);
        currentStep = 3;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function restart() {
        selectedZodiac = null;
        answers = [];
        currentQuestion = 0;
        document.getElementById('userName').value = '';
        document.getElementById('birthDate').value = '';
        document.getElementById('birthTime').value = '';
        document.querySelectorAll('.zodiac-btn').forEach(b => b.classList.remove('selected'));
        goToStep(1);

        const type = document.getElementById('resultType').textContent;
        const nickname = document.getElementById('resultNickname').textContent;
        const text = `🔮 赛博算命结果\n我是 ${type} ${nickname}\n快来测测你的赛博命运！`;
        if (navigator.clipboard) {

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ========== Particle Background ==========
    (function initCanvas() {
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let w, h;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.vx = (Math.random() - 0.5) * 0.3;
                this.vy = (Math.random() - 0.5) * 0.3;
                this.size = Math.random() * 2;
                this.alpha = Math.random() * 0.5 + 0.1;
                this.color = Math.random() > 0.7 ? 'rgba(255,0,229,' : 'rgba(0,240,255,';
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > w || this.y < 0 || this.y > h) this.reset();
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color + this.alpha + ')';
                ctx.fill();
            }
        }

        for (let i = 0; i < 80; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, w, h);
            particles.forEach(p => { p.update(); p.draw(); });

            // Draw connections
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(0,240,255,${0.08 * (1 - dist / 120)})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    })();

    // ========== Date Picker 默认定位到2000年 ==========
    document.addEventListener('DOMContentLoaded', function() {
        const dateInput = document.getElementById('birthDate');
        if (dateInput) {
            // 点击时先临时设置值为2000-01-01让日历定位到该年月
            dateInput.addEventListener('click', function() {
                if (!this.value) {
                    this.value = '2000-01-01';
                }
            });
            // 如果用户清空了选择，失焦时清除默认值
            dateInput.addEventListener('change', function() {
                // 保留用户选择的值，不做干预
            });
        }
    });

    // ========== Background Music (MP3) ==========
    const bgMusic = new Audio('36741646564-1-128-65s.mp3');
    bgMusic.loop = true;
    bgMusic.volume = 0.05;
    let musicStarted = false;

    function toggleMusic() {
        const btn = document.getElementById('musicToggle');
        if (!musicStarted) {
            bgMusic.play().then(() => {
                musicStarted = true;
                btn.classList.remove('muted');
            }).catch(() => {});
            return;
        }
        if (bgMusic.paused) {
            bgMusic.play();
            btn.classList.remove('muted');
        } else {
            bgMusic.pause();
            btn.classList.add('muted');
        }
    }

    // 首次用户交互时启动音频（浏览器自动播放策略）
    ['click', 'touchstart', 'keydown'].forEach(evt => {
        document.addEventListener(evt, function init() {
            if (!musicStarted) {
                bgMusic.play().then(() => {
                    musicStarted = true;
                    document.getElementById('musicToggle').classList.remove('muted');
                }).catch(() => {});
            }
            ['click', 'touchstart', 'keydown'].forEach(e =>
                document.removeEventListener(e, init));
        }, { once: false });
    });
    </script>
